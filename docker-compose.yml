services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: redhorn
      POSTGRES_USER: redhorn
      POSTGRES_PASSWORD: redhorn
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DATABASE_URL: postgres://redhorn:redhorn@db:5432/redhorn
      DJANGO_SECRET_KEY: local-dev-secret
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3100
      CSRF_TRUSTED_ORIGINS: http://localhost:3100
    ports:
      - "8100:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build: ./frontend
    command: npm run dev -- --hostname 0.0.0.0
    environment:
      API_INTERNAL_URL: http://backend:8000/api
      NEXT_PUBLIC_API_URL: http://localhost:8100/api
      NEXT_PUBLIC_MEDIA_BASE_URL: http://localhost:8100
    ports:
      - "3100:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
